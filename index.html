t=scale-down&amp;origin=ugc&amp;q=92&amp;v=1775458593&amp;width=680&amp;sig=4E%2BuKuW0Sagw5zk453%2F3K2GY4zJ3QytcpEKhPL3SjrE%3D\">\n\n\n</div>\n<p><br>some mood board ideas of what I'm wanting the clothcover hardback to look like, talking with the printers about different cloths now (or see that mockup above—not sure what colors are available yet):</p><br><div>\n\n<img alt=\"\" src=\"https://i.kickstarter.com/assets/053/312/899/eec723593a829a147bc70e55d9ef04f0_original.jpeg?fit=scale-down&amp;origin=ugc&amp;q=92&amp;v=1776028630&amp;width=680&amp;sig=Xn%2Bkc1sKmiXz7mMrIbFfypBBNdBKOnfBN3Dcg38sdLY%3D\">\n\n\n</div>\n<div>\n\n<img alt=\"\" src=\"https://i.kickstarter.com/assets/053/312/905/129647484ba126b49d2862c5aa3f90bb_original.jpeg?fit=scale-down&amp;origin=ugc&amp;q=92&amp;v=1776028674&amp;width=680&amp;sig=6Wq1RyD5og7sjby4fxf3dTKaYRCvTkQb2PlN%2FVNAcGw%3D\">\n\n\n</div>\n<div>\n\n<img alt=\"\" src=\"https://i.kickstarter.com/assets/053/312/910/c5198b2b7d690de2aac7d2a710dbe156_original.jpeg?fit=scale-down&amp;origin=ugc&amp;q=92&amp;v=1776028715&amp;width=680&amp;sig=GatuYM%2FoDZHOThGUyJPwlIkf%2FCdtwSYt%2Bav7Nkn0O7g%3D\">\n\n\n</div><br><br><h3>Risks and Challenges</h3>my biggest risk is—are you in this with me? do you want things like this to exist in the world? it's getting harder to find sincere, organic human creativity—not because it isn't happening, but because the arteries of human connection are getting lined with fake stuff. I have done my best to give from the heart and continue that tradition\n\nI noted this above, but my timelines are best estimates. my hope is that I will be able to deliver many of these before their states delivery dates, but with all the moving pieces and shipping details, some things are out of my hands (eg international shipping lanes staying open, hopefully Taylor Swift doesn't do another run of vinyl before I do, lol). I will do my best to deliver with attention to those stated times.", "rewards": [{"name": "Team Zach", "amount": // ---- State ----
var currentProject = null;
var currentTab = "campaign";
var tabStartTime = Date.now();
var tabsClicked = ["Campaign"];
var timeOnTabs = {};

// ---- URL Params ----
function getParam(name) {
  var params = new URLSearchParams(window.location.search);
  return params.get(name);
}

// ---- Init ----
function init() {
  var projectId = parseInt(getParam("project") || "1", 10);
  if (projectId < 1 || projectId > PROJECTS.length) projectId = 1;
  currentProject = PROJECTS[projectId - 1];

  var startTab = getParam("tab");
  if (startTab && ["campaign","rewards","creator","faq","updates","comments","community"].indexOf(startTab) !== -1) {
    currentTab = startTab;
  }

  renderProject();
  renderTab();
  setupTabs();
}

// ---- Render Project Header ----
function renderProject() {
  var p = currentProject;
  document.getElementById("ks-category").textContent = p.category;
  document.getElementById("ks-hero-img").src = p.image_url;
  document.getElementById("ks-hero-img").alt = p.name;
  document.getElementById("ks-title").textContent = p.name;
  document.getElementById("ks-blurb").textContent = p.blurb;
  document.getElementById("ks-creator-link").innerHTML = '<a href="' + escHtml(p.url) + '" target="_blank" rel="noopener">View on Kickstarter</a>';

  var pctClamped = Math.min(p.pct_funded, 100);
  document.getElementById("ks-progress").style.width = pctClamped + "%";
  document.getElementById("ks-pct-funded").textContent = Math.round(p.pct_funded) + "% funded";
  document.getElementById("ks-pledged").textContent = "$" + p.pledged_usd.toLocaleString();
  document.getElementById("ks-pledge-label").textContent = "pledged of $" + p.goal_usd.toLocaleString() + " goal";
  document.getElementById("ks-backers").textContent = p.backers.toLocaleString();
  document.getElementById("ks-days").textContent = p.days_left;

  // Sidebar rewards (max 5, show all regardless of availability)
  var rewards = p.rewards || [];
  var shown = rewards.slice(0, 5);
  var html = "";
  for (var i = 0; i < shown.length; i++) {
    var r = shown[i];
    html += '<div class="ks-sidebar-reward">';
    html += '<div class="pledge">Pledge ' + escHtml(r.amount) + '</div>';
    html += '<div class="rname">' + escHtml(r.name) + '</div>';
    if (r.description) {
      var desc = r.description.length > 120 ? r.description.substring(0, 120) + "..." : r.description;
      html += '<div class="rdesc">' + escHtml(desc) + '</div>';
    }
    if (r.delivery) {
      html += '<div class="rmeta">Est. delivery: ' + formatDelivery(r.delivery) + '</div>';
    }
    if (r.shipping) {
      html += '<div class="rmeta">Ships to: ' + escHtml(r.shipping) + '</div>';
    }
    if (r.backers) {
      html += '<div class="rmeta">' + r.backers.toLocaleString() + ' backer' + (r.backers !== 1 ? 's' : '') + '</div>';
    }
    if (r.limit && r.remaining != null) {
      html += '<div class="rlimited">Limited: ' + r.remaining + ' of ' + r.limit + ' remaining</div>';
    }
    html += '</div>';
  }
  document.getElementById("ks-sidebar-rewards").innerHTML = html;
}

// ---- Tab Switching ----
function setupTabs() {
  var tabs = document.querySelectorAll(".ks-tab");
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].addEventListener("click", function() {
      // Record time on previous tab
      var elapsed = Math.round((Date.now() - tabStartTime) / 1000);
      var prevLabel = currentTab.charAt(0).toUpperCase() + currentTab.slice(1);
      timeOnTabs[prevLabel] = (timeOnTabs[prevLabel] || 0) + elapsed;

      // Switch tab
      currentTab = this.getAttribute("data-tab");
      tabStartTime = Date.now();

      var label = currentTab.charAt(0).toUpperCase() + currentTab.slice(1);
      if (tabsClicked.indexOf(label) === -1) tabsClicked.push(label);

      // Update UI
      var allTabs = document.querySelectorAll(".ks-tab");
      for (var j = 0; j < allTabs.length; j++) allTabs[j].classList.remove("active");
      this.classList.add("active");

      renderTab();
      sendInteraction();
    });
  }

  // Set initial active tab
  var allTabs = document.querySelectorAll(".ks-tab");
  for (var j = 0; j < allTabs.length; j++) {
    allTabs[j].classList.remove("active");
    if (allTabs[j].getAttribute("data-tab") === currentTab) {
      allTabs[j].classList.add("active");
    }
  }
}

// ---- Render Tab Content ----
function renderTab() {
  var container = document.getElementById("ks-tab-content");
  container.scrollTop = 0;

  switch (currentTab) {
    case "campaign":
      container.innerHTML = currentProject.description_html || '<div class="ks-empty-state">No description available.</div>';
      break;
    case "rewards":
      container.innerHTML = renderRewardsTab();
      break;
    case "creator":
      container.innerHTML = renderCreatorTab();
      break;
    case "faq":
      container.innerHTML = '<div class="ks-empty-state">No FAQs have been posted yet.</div>';
      break;
    case "updates":
      container.innerHTML = '<div class="ks-empty-state">No updates yet.</div>';
      break;
    case "comments":
      container.innerHTML = '<div class="ks-empty-state">No comments yet.</div>';
      break;
    case "community":
      container.innerHTML = renderCommunityTab();
      break;
  }
}

function renderRewardsTab() {
  var rewards = currentProject.rewards || [];
  if (rewards.length === 0) return '<div class="ks-empty-state">No rewards available.</div>';

  var html = '<h3 style="margin-bottom:16px;">Support this project</h3>';
  for (var i = 0; i < rewards.length; i++) {
    var r = rewards[i];
    html += '<div class="ks-reward-card">';
    html += '<div class="pledge">Pledge ' + escHtml(r.amount) + ' or more</div>';
    html += '<div class="rname">' + escHtml(r.name) + '</div>';
    if (r.description) {
      html += '<div class="rdesc">' + escHtml(r.description) + '</div>';
    }
    if (r.delivery) {
      html += '<div class="rmeta">Estimated delivery: ' + formatDelivery(r.delivery) + '</div>';
    }
    if (r.shipping) {
      html += '<div class="rmeta">Ships to: ' + escHtml(r.shipping) + '</div>';
    }
    if (r.limit && r.remaining != null) {
      html += '<div class="rlimited">Limited (' + r.remaining + ' of ' + r.limit + ' left)</div>';
    }
    if (r.backers != null) {
      html += '<div class="rbacker-count">' + r.backers.toLocaleString() + ' backer' + (r.backers !== 1 ? 's' : '') + '</div>';
    }
    html += '<div class="rselect-btn">Select this reward</div>';
    html += '</div>';
  }
  return html;
}

function renderCreatorTab() {
  var p = currentProject;
  return '<div style="padding:20px 0;">' +
    '<div style="font-size:13px;color:#696969;margin-bottom:6px;">CREATOR</div>' +
    '<div style="font-size:18px;font-weight:600;margin-bottom:8px;">' + escHtml(p.name.split(":")[0].split(" - ")[0]) + '</div>' +
    '<div style="font-size:14px;color:#696969;margin-bottom:12px;">First created &middot; 1 backed</div>' +
    '<a href="' + escHtml(p.url) + '" target="_blank" rel="noopener" style="font-size:14px;">View project on Kickstarter &rarr;</a>' +
    '</div>';
}

function renderCommunityTab() {
  var p = currentProject;
  return '<div style="padding:20px 0;">' +
    '<div style="font-size:22px;font-weight:700;margin-bottom:4px;">' + p.backers.toLocaleString() + '</div>' +
    '<div style="font-size:14px;color:#696969;margin-bottom:20px;">total backers</div>' +
    '<div style="font-size:14px;color:#696969;">' + Math.max(1, Math.round(p.backers * 0.7)) + ' new backers &middot; ' + Math.max(0, Math.round(p.backers * 0.3)) + ' returning backers</div>' +
    '</div>';
}

// ---- Helpers ----
function escHtml(str) {
  if (!str) return "";
  var div = document.createElement("div");
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function formatDelivery(dateStr) {
  if (!dateStr) return "";
  var parts = dateStr.split("-");
  if (parts.length < 2) return dateStr;
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var m = parseInt(parts[1], 10) - 1;
  return months[m] + " " + parts[0];
}

// ---- postMessage to Qualtrics ----
function sendInteraction() {
  var contentEl = document.getElementById("ks-tab-content");
  var scrollDepth = 0;
  if (contentEl.scrollHeight > contentEl.clientHeight) {
    scrollDepth = Math.round((contentEl.scrollTop / (contentEl.scrollHeight - contentEl.clientHeight)) * 100) / 100;
  }
  try {
    window.parent.postMessage({
      type: "ks_interaction",
      projectId: currentProject.id,
      tabsClicked: tabsClicked,
      timeOnTabs: timeOnTabs,
      scrollDepth: scrollDepth
    }, "*");
  } catch(e) {}
}

// Send scroll depth periodically
var scrollTimer = null;
document.getElementById("ks-tab-content").addEventListener("scroll", function() {
  if (scrollTimer) clearTimeout(scrollTimer);
  scrollTimer = setTimeout(sendInteraction, 500);
});

// Send final interaction on unload
window.addEventListener("beforeunload", function() {
  var elapsed = Math.round((Date.now() - tabStartTime) / 1000);
  var label = currentTab.charAt(0).toUpperCase() + currentTab.slice(1);
  timeOnTabs[label] = (timeOnTabs[label] || 0) + elapsed;
  sendInteraction();
});

// Boot
init();
</script>
